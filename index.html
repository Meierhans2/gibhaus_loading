<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Gibhaus Loading</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: #050000; 
            color: #fff; 
            font-family: 'Roboto', 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px;
            position: relative;
        }

        /* ===== STATISCHES GPU-BLUT (KEIN REFLOW!) ===== */
        .blood-container {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        .drop {
            position: absolute;
            background: #8a0303;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            opacity: 0;
            /* Zwingt die Ebenen permanent auf die GPU */
            transform: translate3d(0,0,0) scale(0);
            animation: splatAndRun linear infinite;
        }

        @keyframes splatAndRun {
            0% { transform: translate3d(0,0,0) scale(0); opacity: 0; }
            3% { transform: translate3d(0,0,0) scale(1); opacity: 0.9; }
            12% { transform: translate3d(0, 10px, 0) scale(0.95); opacity: 0.9; }
            85% { transform: translate3d(0, 180px, 0) scale(0.6); opacity: 0.4; }
            100% { transform: translate3d(0, 220px, 0) scale(0); opacity: 0; }
        }

        /* ===== 16:9 DIASHOW ===== */
        .slideshow-wrapper {
            margin-top: auto;
            margin-bottom: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            z-index: 10;
        }

        .slideshow-container {
            width: 65vw; 
            height: 36.56vw; 
            position: relative;
            overflow: hidden;
            background: #000;
            border: 2px solid rgba(255, 0, 60, 0.4);
            box-shadow: 0 0 30px rgba(0,0,0,0.9);
        }

        .slide {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1.5s ease-in-out; 
        }

        .slide.active {
            opacity: 1;
        }

        /* ===== GRAUE TEXTANZEIGE UNTEN ===== */
        .file-line {
            font-size: 20px;
            font-weight: 500;
            color: #888888;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 90vw;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
            z-index: 10;
        }
      /* ===== ADDON VORSCHAU UNTEN RECHTS ===== */
        #addon-preview {
            position: absolute;
            right: 40px;         /* Verschiebt das Bild auf die rechte Seite */
            bottom: 12vh;        /* Platziert das Bild ca. 10-12% über dem unteren Bildschirmrand */
            width: 250px;        /* Gewünschte Breite der Vorschau */
            height: auto;
            z-index: 100;
            border-radius: 4px;
            object-fit: cover;
}


    </style>
</head>
<body>

    <!-- Feste Anzahl von Tropfen im HTML vorgerendert (Staffelung über Delay) -->
    <div class="blood-container">
        <div class="drop" style="left: 12vw; top: 15vh; width: 12px; height: 16px; animation-duration: 7s; animation-delay: 0s;"></div>
        <div class="drop" style="left: 28vw; top: 45vh; width: 8px; height: 11px; animation-duration: 9s; animation-delay: 3s;"></div>
        <div class="drop" style="left: 45vw; top: 10vh; width: 16px; height: 22px; animation-duration: 6s; animation-delay: 1.5s;"></div>
        <div class="drop" style="left: 72vw; top: 30vh; width: 10px; height: 14px; animation-duration: 8s; animation-delay: 5s;"></div>
        <div class="drop" style="left: 88vw; top: 55vh; width: 14px; height: 19px; animation-duration: 10s; animation-delay: 2.5s;"></div>
        
        <div class="drop" style="left: 5vw; top: 60vh; width: 9px; height: 12px; animation-duration: 8.5s; animation-delay: 4s;"></div>
        <div class="drop" style="left: 22vw; top: 20vh; width: 15px; height: 21px; animation-duration: 6.5s; animation-delay: 7s;"></div>
        <div class="drop" style="left: 55vw; top: 50vh; width: 7px; height: 10px; animation-duration: 11s; animation-delay: 0.5s;"></div>
        <div class="drop" style="left: 80vw; top: 15vh; width: 11px; height: 15px; animation-duration: 7.5s; animation-delay: 6s;"></div>
        <div class="drop" style="left: 93vw; top: 35vh; width: 13px; height: 18px; animation-duration: 9.5s; animation-delay: 1s;"></div>
    </div>

    <div class="slideshow-wrapper">
        <div class="slideshow-container" id="slideshow"></div>
    </div>

    <div class="file-line" id="file-text">Connecting...</div>

    <script>
        // ==========================================
        // EINFACHE EINSTELLUNGEN
        // ==========================================
        const ORDNERNAME = "slides/";             
        const ANZAHL_BILDER = 7;                  
        const WORKSHOP_ID = "3387451124";         
        const ANZEIGE_DAUER = 15000;              

        // ==========================================
        // AUTOMATISCHE DIASHOW
        // ==========================================
        const container = document.getElementById('slideshow');
        
        for (let i = 1; i <= ANZAHL_BILDER; i++) {
            const img = document.createElement('img');
            const nummer = String(i).padStart(3, '0'); 
            img.src = ORDNERNAME + nummer + ".jpg";
            img.classList.add('slide');
            container.appendChild(img);
        }

        const slides = document.querySelectorAll('.slide');
        let aktuellesBild = Math.floor(Math.random() * ANZAHL_BILDER);
        
        if (slides.length > 0) {
            slides[aktuellesBild].classList.add('active');
        }

        setInterval(() => {
            if (slides.length > 0) {
                slides[aktuellesBild].classList.remove('active');
                aktuellesBild = (aktuellesBild + 1) % slides.length;
                slides[aktuellesBild].classList.add('active');
            }
        }, ANZEIGE_DAUER);
// ==========================================
// GMOD DOWNLOAD ANZEIGE
// ==========================================
function DownloadingFile(fileName) {
    if (!fileName || typeof fileName !== "string") return;

    let reinerName = fileName;
    
    // Falls ein Anführungszeichen existiert, splitten
    if (fileName.indexOf("'") !== -1) {
        var parts = fileName.split("'");
        if (parts.length > 1) {
            reinerName = parts[1];
        }
        // Sicheres Entfernen des schließenden Anführungszeichens
        if (reinerName && reinerName.charAt(reinerName.length - 1) === "'") {
            reinerName = reinerName.slice(0, -1);
        }
    } else {
        // Fallback für normale Pfade ohne Anführungszeichen
        var lastSlash = Math.max(reinerName.lastIndexOf('/'), reinerName.lastIndexOf('\\'));
        if (lastSlash !== -1) {
            reinerName = reinerName.substring(lastSlash + 1);
        }
        reinerName = reinerName.replace(/\.[^/.]+$/, "");
    }

    // Ersetzt ungültige Zeichen exakt wie dein Python-Skript
    var sanitizedName = reinerName.replace(/[\\/*?:"<>|]/g, '_').trim();
    var vollerPfad = "addon_previews/" + sanitizedName + ".jpg";

    // Elemente sicher abrufen
    var fileTextEl = document.getElementById('file-text');
    var previewImg = document.getElementById('addon-preview');

    if (fileTextEl) {
        // Säubert die Anzeige von "workshop content '" am Anfang des Textes
        var anzeigeText = fileName;
        if (anzeigeText.indexOf("workshop content '") === 0) {
            anzeigeText = anzeigeText.replace("workshop content '", "");
            // Falls am Ende ein einsames Anführungszeichen übrig bleibt, entfernen
            if (anzeigeText.charAt(anzeigeText.length - 1) === "'") {
                anzeigeText = anzeigeText.slice(0, -1);
            }
        }
        fileTextEl.innerHTML = "Downloading: " + anzeigeText;
    }
    
    // DEBUG-PART: Nur auskommentiert!
    // var debugTextEl = document.getElementById('debug-text');
    // if (debugTextEl) {
    //     debugTextEl.innerHTML = "Gesuchter Bild-Pfad: " + vollerPfad;
    // }

    if (previewImg) {
        // Unsichtbarer Hintergrund-Check verhindert, dass jemals ein schwarzer Kasten aufblitzt
        var imgChecker = new Image();
        imgChecker.src = vollerPfad;
        
        imgChecker.onload = function() {
            previewImg.src = vollerPfad;
            previewImg.style.display = "block";
        };
        
        imgChecker.onerror = function() {
            // Wenn das Bild auf dem Server fehlt, tun wir absolut nichts.
            // Die letzte erfolgreiche Vorschau bleibt einfach unberührt stehen.
        };
    }
}

function SetStatusChanged(status) {
    var fileTextEl = document.getElementById('file-text');
    if (fileTextEl) {
        fileTextEl.innerHTML = status;
    }
}

function SetFilesNeeded(needed) {} 

window.onload = function() {
    if (typeof WORKSHOP_ID !== 'undefined' && WORKSHOP_ID) {
        window.location.href = "steam://url/CommunityFilePage/" + WORKSHOP_ID;
    }
};

    </script>
    
    <!-- Die Debug-Zeile direkt unter dem normalen Text -->
    <div id="debug-text" style="position: absolute; left: 40px; bottom: 4vh; color: rgba(255,255,255,0.5); font-family: sans-serif; font-size: 14px; z-index: 100;"></div>

    <!-- Addon-Vorschau über der Ladeleiste auf der rechten Seite -->
    <img id="addon-preview" src="" style="display: none; position: absolute; right: 40px; bottom: 10vh; width: 250px; height: auto; border: 2px solid rgba(255, 0, 60, 0.4); box-shadow: 0 0 20px rgba(0,0,0,0.8); z-index: 100;" alt="Addon Vorschau">

</body>
</html>
