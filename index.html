<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Gibhaus Loading</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: #050000; 
            color: #fff; 
            font-family: 'Roboto', 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px;
            position: relative;
        }

        /* ===== GPU-BESCHLEUNIGTE BLUTTROPFEN-ANIMATION ===== */
        .blood-container {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1;
            pointer-events: none;
        }

        .drop {
            position: absolute;
            background: #8a0303; /* Dunkles Blutrot */
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            opacity: 0;
            /* translate3d zwingt die GMod-Chromium-Engine zur GPU-Nutzung */
            transform: translate3d(0,0,0) scale(0);
        }

        /* Tropfen-Animation: Spritzen, kurz halten, dann langsam runterlaufen */
        @keyframes splatAndRun {
            0% { transform: translate3d(0,0,0) scale(0); opacity: 0; }
            5% { transform: translate3d(0,0,0) scale(1); opacity: 0.9; }
            15% { transform: translate3d(0, 10px, 0) scale(0.95); opacity: 0.9; }
            85% { transform: translate3d(0, 180px, 0) scale(0.6); opacity: 0.4; }
            100% { transform: translate3d(0, 220px, 0) scale(0); opacity: 0; }
        }

        /* ===== 16:9 DIASHOW ===== */
        .slideshow-wrapper {
            margin-top: auto;
            margin-bottom: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            z-index: 10; /* Liegt über dem Blut */
        }

        .slideshow-container {
            width: 65vw; 
            aspect-ratio: 16 / 9; 
            position: relative;
            overflow: hidden;
            background: #000;
            border: 2px solid rgba(255, 0, 60, 0.4);
            box-shadow: 0 0 30px rgba(0,0,0,0.9);
        }

        .slide {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1.5s ease-in-out; 
        }

        .slide.active {
            opacity: 1;
        }

        /* ===== GRAUE TEXTANZEIGE UNTEN ===== */
        .file-line {
            font-size: 20px;
            font-weight: 500;
            color: #888888;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 90vw;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <!-- Hier spritzt das Blut im Hintergrund -->
    <div class="blood-container" id="blood-screen"></div>

    <!-- Mittiges 16:9 Objekt -->
    <div class="slideshow-wrapper">
        <div class="slideshow-container" id="slideshow">
            <!-- Bilder werden vom Skript geladen -->
        </div>
    </div>

    <!-- Schlichte graue Statuszeile ganz unten -->
    <div class="file-line" id="file-text">Verbindung wird hergestellt...</div>

    <script>
        // ==========================================
        // EINFACHE EINSTELLUNGEN
        // ==========================================
        const ORDNERNAME = "slides/";             // Ordner der Bilder (muss mit / enden)
        const ANZAHL_BILDER = 5;                  // Bildanzahl (001.jpg, 002.jpg, etc.)
        const WORKSHOP_ID = "3387451124";         // Deine Steam-Workshop ID
        const ANZEIGE_DAUER = 15000;              // 15 Sekunden Standzeit pro Bild


        // ==========================================
        // AUTOMATISCHE DIASHOW
        // ==========================================
        const container = document.getElementById('slideshow');
        
        for (let i = 1; i <= ANZAHL_BILDER; i++) {
            const img = document.createElement('img');
            const nummer = String(i).padStart(3, '0'); 
            img.src = ORDNERNAME + nummer + ".jpg";
            img.classList.add('slide');
            container.appendChild(img);
        }

        const slides = document.querySelectorAll('.slide');
        let aktuellesBild = Math.floor(Math.random() * ANZAHL_BILDER);
        
        if (slides.length > 0) {
            slides[aktuellesBild].classList.add('active');
        }

        setInterval(() => {
            if (slides.length > 0) {
                slides[aktuellesBild].classList.remove('active');
                aktuellesBild = (aktuellesBild + 1) % slides.length;
                slides[aktuellesBild].classList.add('active');
            }
        }, ANZEIGE_DAUER);


        // ==========================================
        // DYNAMISCHE BLUT-SPRITZER (GPU AUTOMATIK)
        // ==========================================
        const bloodScreen = document.getElementById('blood-screen');
        const MAX_TROPFEN = 12; // Maximale Tropfen gleichzeitig, um GMod nicht zu lahmen

        function erzeugeBluttropfen() {
            // Nur neue Tropfen erzeugen, wenn das Limit nicht überschritten ist
            if (bloodScreen.childElementCount >= MAX_TROPFEN) return;

            const drop = document.createElement('div');
            drop.classList.add('drop');

            // Zufällige Größe und Position auf dem Bildschirm berechnen
            const groesse = Math.floor(Math.random() * 12) + 6; // 6px bis 18px breit
            const xPos = Math.floor(Math.random() * 95); // 0% bis 95% Breite
            const yPos = Math.floor(Math.random() * 70); // 0% bis 70% Höhe (nicht zu tief)
            
            // Zufällige Dauer, wie schnell das Blut läuft
            const laufzeit = (Math.random() * 4) + 4; // 4 bis 8 Sekunden

            // CSS-Eigenschaften direkt auf das Element schreiben
            drop.style.width = groesse + "px";
            drop.style.height = (groesse * 1.4) + "px"; // Leicht länglich gezerrt
            drop.style.left = xPos + "vw";
            drop.style.top = yPos + "vh";
            drop.style.animation = `splatAndRun ${laufzeit}s ease-in-out forwards`;

            bloodScreen.appendChild(drop);

            // Löscht den Tropfen automatisch aus dem HTML, wenn die Animation vorbei ist
            setTimeout(() => {
                drop.remove();
            }, laufzeit * 1000);
        }

        // Alle 1,5 Sekunden wird gewürfelt, ob ein neuer Blutspritzer auftaucht
        setInterval(erzeugeBluttropfen, 1500);


        // ==========================================
        // GMOD DOWNLOAD ANZEIGE
        // ==========================================
        function DownloadingFile(fileName) {
            document.getElementById('file-text').innerHTML = "Lade Datei: " + fileName;
        }

        function SetStatusChanged(status) {
            document.getElementById('file-text').innerHTML = status;
        }

        function SetFilesNeeded(needed) {} 

        window.onload = function() {
            if (WORKSHOP_ID) {
                window.location.href = "steam://url/CommunityFilePage/" + WORKSHOP_ID;
            }
        };
    </script>
</body>
</html>
